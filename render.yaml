services:
  - type: web
    name: rentease-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # ── Database ───────────────────────────────────────────────────
      # Set MONGO_URI in Render dashboard → Environment
      - key: MONGO_URI
        sync: false

      # ── Auth ──────────────────────────────────────────────────────
      # Set JWT_SECRET in Render dashboard (64+ char random string)
      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRE
        value: 7d

      # ── CORS ──────────────────────────────────────────────────────
      # Set CLIENT_URL to your Vercel frontend URL after deployment
      # e.g. https://rent-ease-xyz.vercel.app
      - key: CLIENT_URL
        sync: false

      # ── Razorpay ──────────────────────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false

      - key: RAZORPAY_SECRET
        sync: false

      # ── Cloudinary (image uploads) ─────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email / SMTP ───────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false

      - key: SMTP_PORT
        value: 587

      - key: SMTP_USER
        sync: false

      - key: SMTP_PASS
        sync: false

      - key: EMAIL_FROM
        value: noreply@rentease.com
