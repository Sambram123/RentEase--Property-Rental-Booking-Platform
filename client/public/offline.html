<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentEase — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: linear-gradient(135deg, #fff5f7 0%, #fff 50%, #fff5f7 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
        padding: 2.5rem;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      }
      .icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #ff385c, #e31c5f);
        border-radius: 20px;
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }
      h1 { font-size: 1.5rem; font-weight: 700; color: #222; margin-bottom: 0.75rem; }
      p { color: #717171; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
      button {
        background: linear-gradient(135deg, #ff385c, #e31c5f);
        color: white;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(255,56,92,0.3);
      }
      .status {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: #717171;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🏠</div>
      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. 
        Please check your connection and try again.
      </p>
      <button onclick="window.location.reload()">Try Again</button>
      <div class="status">
        <span class="dot"></span>
        <span>Waiting for connection...</span>
      </div>
    </div>
    <script>
      window.addEventListener('online', () => window.location.reload());
    </script>
  </body>
</html>
